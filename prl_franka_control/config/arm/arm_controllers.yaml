joint_state_broadcaster:
  ros__parameters:
    interfaces:
      - position
      - velocity
      - effort

fr3_arm_controller:
    ros__parameters:
      type: joint_trajectory_controller/JointTrajectoryController
      command_interfaces:
        - effort
      state_interfaces:
        - position
        - velocity
      joints:
        - fr3_joint1
        - fr3_joint2
        - fr3_joint3
        - fr3_joint4
        - fr3_joint5
        - fr3_joint6
        - fr3_joint7
      gains:
        fr3_joint1: { p: 600., d: 30., i: 0., i_clamp: 1., ff_velocity_scale: 0.0 }
        fr3_joint2: { p: 600., d: 30., i: 0., i_clamp: 1., ff_velocity_scale: 0.0 }
        fr3_joint3: { p: 600., d: 30., i: 0., i_clamp: 1., ff_velocity_scale: 0.0 }
        fr3_joint4: { p: 600., d: 30., i: 0., i_clamp: 1., ff_velocity_scale: 0.0 }
        fr3_joint5: { p: 250., d: 10., i: 0., i_clamp: 1., ff_velocity_scale: 0.0 }
        fr3_joint6: { p: 150., d: 10., i: 0., i_clamp: 1., ff_velocity_scale: 0.0 }
        fr3_joint7: { p: 50.,  d: 5.,  i: 0., i_clamp: 1., ff_velocity_scale: 0.0 }

torque_passthrough_controller:
  ros__parameters:
    type: "prl_franka_controllers/TorquePassthroughController"
    arm_id: "fr3"
    k_p: 0.0
    k_i: 20.0
    k_q: 40.0
    k_v: 20.0

gravity_compensation_example_controller:
  ros__parameters:
    type: franka_example_controllers/GravityCompensationExampleController
    arm_id: "fr3"
