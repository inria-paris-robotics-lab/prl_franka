[workspace]
authors = ["Timothée Carecchio <timothee.carecchio@inria.fr>"]
channels = ["robostack-staging","conda-forge"]
name = "prl_franka"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
build_ws = "colcon build --symlink-install"

[activation]

env = { ROS_LOCALHOST_ONLY = "1", ROS_DOMAIN_ID = "42", LC_ALL = "en_US.UTF-8", LC_NUMERIC = "en_US.UTF-8"}


[dependencies]
bullet = ">=3.25,<4"
ccache = ">=4.11.3,<5"
cmake = ">=4.1.2,<5"
colcon-common-extensions = ">=0.3.0,<0.4"
compilers = ">=1.11.0,<2"
cxx-compiler = ">=1.11.0,<2"
fmt = ">=11.2.0,<12"
ipython = ">=9.6.0,<10"
matplotlib = ">=3.10.7,<4"
proxsuite = ">=0.7.2,<0.8"
qhull = ">=2020.2,<2021"
qhull-static = ">=2020.2,<2021"
eiquadprog = ">=1.3.0,<2"
scipy = ">=1.16.3,<2"
urdfdom = ">=4.0.1,<5"
vcstool = ">=0.3.0,<0.4"
ros-humble-desktop-full = ">=0.10.0,<0.11"
ros-humble-diagnostic-updater = ">=4.0.6,<5"
ros-humble-geographic-msgs = ">=1.0.6,<2"
ros-humble-rosidl-generator-dds-idl = ">=0.8.1,<0.9"
rosdep = ">=0.26.0,<0.27"
ros-humble-franka-bringup = ">=1.0.0,<2"
ros-humble-franka-description = ">=0.4.0,<0.5"
ros-humble-franka-example-controllers = ">=1.0.0,<2"
ros-humble-franka-fr3-moveit-config = ">=1.0.0,<2"
ros-humble-franka-gazebo-bringup = ">=1.0.0,<2"
ros-humble-franka-gripper = ">=1.0.0,<2"
ros-humble-franka-hardware = ">=1.0.0,<2"
ros-humble-franka-ign-ros2-control = ">=1.0.0,<2"
ros-humble-franka-msgs = ">=1.0.0,<2"
ros-humble-franka-robot-state-broadcaster = ">=1.0.0,<2"
ros-humble-franka-ros2 = ">=1.0.0,<2"
ros-humble-franka-semantic-components = ">=1.0.0,<2"
argcomplete = ">=3.6.3,<4"
ros-humble-gripper-controllers = ">=2.48.0,<3"
ros-humble-force-torque-sensor-broadcaster = ">=2.48.0,<3"
ros-humble-moveit-setup-assistant = ">=2.5.9,<3"
numpy = ">=1.26.4,<2"
