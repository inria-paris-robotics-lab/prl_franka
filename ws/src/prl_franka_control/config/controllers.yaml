joint_state_broadcaster:
  ros__parameters:
    interfaces:
      - position
      - velocity
      - effort

gripper_action_controller:
  ros__parameters:
    type: effort_controllers/GripperActionController
    action_monitor_rate: 20.0
    joint: fr3_finger_joint1
    gains:
      fr3_finger_joint1:
        d: 10.0
        i: 0.1
        i_clamp: 0.5
        p: 20.0

fr3_arm_controller:
    ros__parameters:
      type: joint_trajectory_controller/JointTrajectoryController
      command_interfaces:
        - effort
      state_interfaces:
        - position
        - velocity
      joints:
        - fr3_joint1
        - fr3_joint2
        - fr3_joint3
        - fr3_joint4
        - fr3_joint5
        - fr3_joint6
        - fr3_joint7
      gains:
        fr3_joint1: { p: 600., d: 30., i: 0., i_clamp: 1. }
        fr3_joint2: { p: 600., d: 30., i: 0., i_clamp: 1. }
        fr3_joint3: { p: 600., d: 30., i: 0., i_clamp: 1. }
        fr3_joint4: { p: 600., d: 30., i: 0., i_clamp: 1. }
        fr3_joint5: { p: 250., d: 10., i: 0., i_clamp: 1. }
        fr3_joint6: { p: 150., d: 10., i: 0., i_clamp: 1. }
        fr3_joint7: { p: 50., d: 5., i: 0., i_clamp: 1. }
